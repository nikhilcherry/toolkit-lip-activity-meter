<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="280" fill="#101418"/>
  <text x="450" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#e6e6e6" font-weight="700">windowSize controls how much history feeds the variance</text>

  <!-- timeline dots: 20 samples, last 12 highlighted -->
  <g transform="translate(60,100)">
    <!-- older samples (dropped) -->
    <circle cx="0" cy="0" r="7" fill="#2c353d"/>
    <circle cx="40" cy="0" r="7" fill="#2c353d"/>
    <circle cx="80" cy="0" r="7" fill="#2c353d"/>
    <circle cx="120" cy="0" r="7" fill="#2c353d"/>
    <circle cx="160" cy="0" r="7" fill="#2c353d"/>
    <circle cx="200" cy="0" r="7" fill="#2c353d"/>
    <circle cx="240" cy="0" r="7" fill="#2c353d"/>
    <circle cx="280" cy="0" r="7" fill="#2c353d"/>

    <!-- window highlight box (windowSize = 12) -->
    <rect x="308" y="-28" width="480" height="56" rx="10" fill="none" stroke="#3ddc84" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- kept samples -->
    <circle cx="320" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="360" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="400" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="440" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="480" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="520" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="560" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="600" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="640" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="680" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="720" cy="0" r="7" fill="#3ddc84"/>
    <circle cx="760" cy="0" r="7" fill="#3ddc84"/>

    <line x1="0" y1="0" x2="780" y2="0" stroke="#2c353d" stroke-width="1" stroke-dasharray="2,4"/>

    <text x="140" y="-40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7680">dropped (older than windowSize)</text>
    <text x="548" y="-40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3ddc84">last windowSize = 12 samples kept</text>

    <text x="0" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7680">t1</text>
    <text x="780" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3ddc84">now</text>
  </g>

  <g transform="translate(60,190)">
    <path d="M 548 0 L 548 30 L 548 30" stroke="none"/>
    <line x1="548" y1="5" x2="548" y2="30" stroke="#9aa4ad" stroke-width="1.5"/>
    <polygon points="543,28 553,28 548,36" fill="#9aa4ad"/>
  </g>
  <rect x="360" y="230" width="180" height="34" rx="8" fill="#132018" stroke="#3ddc84" stroke-width="1.5"/>
  <text x="450" y="252" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#3ddc84" font-weight="700">variance() &#8594; energy</text>
</svg>
