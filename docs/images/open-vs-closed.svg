<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="420" fill="#101418"/>
  <text x="450" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#e6e6e6" font-weight="700">mouthRatio scales with how open the mouth is</text>

  <!-- Closed mouth -->
  <g transform="translate(60,70)">
    <rect width="340" height="300" rx="12" fill="#161d24" stroke="#2c353d" stroke-width="1.5"/>
    <text x="170" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#e6e6e6" font-weight="600">Mouth closed</text>
    <ellipse cx="170" cy="170" rx="90" ry="120" fill="none" stroke="#2c353d" stroke-width="2"/>
    <circle cx="170" cy="90" r="4" fill="#ffb454"/>
    <circle cx="170" cy="250" r="4" fill="#ffb454"/>
    <line x1="170" y1="90" x2="170" y2="250" stroke="#ffb454" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="170" y1="168" x2="170" y2="172" stroke="#3ddc84" stroke-width="4" stroke-linecap="round"/>
    <text x="170" y="278" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#3ddc84" font-weight="700">ratio &#8776; 0.03</text>
  </g>

  <!-- Open mouth -->
  <g transform="translate(500,70)">
    <rect width="340" height="300" rx="12" fill="#161d24" stroke="#2c353d" stroke-width="1.5"/>
    <text x="170" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#e6e6e6" font-weight="600">Mouth open</text>
    <ellipse cx="170" cy="170" rx="90" ry="120" fill="none" stroke="#2c353d" stroke-width="2"/>
    <circle cx="170" cy="90" r="4" fill="#ffb454"/>
    <circle cx="170" cy="250" r="4" fill="#ffb454"/>
    <line x1="170" y1="90" x2="170" y2="250" stroke="#ffb454" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="170" y1="145" x2="170" y2="195" stroke="#3ddc84" stroke-width="4" stroke-linecap="round"/>
    <text x="170" y="278" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#3ddc84" font-weight="700">ratio &#8776; 0.18</text>
  </g>

  <text x="450" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7680">The gap between the two orange landmarks (13/14) grows relative to face height (10/152) as the mouth opens.</text>
</svg>
